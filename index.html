<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي الشخصي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- يمكنك تغيير الاسم بالأسفل لاسمك الشخصي -->
    <h1>مرحباً بكم في موقع أحمد عمر! 👋</h1>
    
    <!-- يمكنك تعديل هذا الوصف ليعبر عن هواياتك أو عملك -->
    <p>أنا مبرمج طموح، وهذا هو موقعي الإلكتروني الأول الذي قمت ببنائه وتطويره بنفسي.</p>

    <!-- وسم إضافة الصورة -->
    <!-- استبدل الرابط أدناه برابط أي صورة تريدها على الإنترنت -->
    <img src="https://picsum.photos" alt="صورة تعبيرية" style="border-radius: 50%; margin: 20px 0; box-shadow: 0 4px 8px rgba(0,0,0,0.15);">

    <br>
    
    <!-- يمكنك تغيير رابط جوجل برابط حسابك على فيسبوك أو إنستغرام أو واتساب -->
    <a href="https://google.com" class="my-button">تواصل معي هُنا</a>

</body>
</html>
